<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Team · Small Town Select Tournaments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css" />
<style>
  .tbl td.gw b { color: #047857; }
  .tbl td.gl b { color: var(--sts-red); }
  .tbl td.gt b { color: var(--muted); }
  .gh-trophy { font-size: 13px; }
</style>
</head>
<body>

<div id="sts-nav"></div>

<div id="teamRoot">
  <div class="team-hero"><div class="container"><div class="th-inner"><div class="team-logo">…</div><div><h1>Loading…</h1></div></div></div></div>
</div>

<div id="sts-footer"></div>

<script src="js/sts-bracket.js"></script>
<script src="js/sts-chrome.js"></script>
<script type="module">
  import * as STS from './js/sts-data.js';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function qs(k){ return new URLSearchParams(location.search).get(k); }
  function slugify(s){ return String(s==null?'':s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(s){ if(!s) return 'TBD'; var d=new Date(s+'T12:00:00'); if(isNaN(d)) return s; return MON[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }

  (async function(){
    var id = qs('id');
    var root = document.getElementById('teamRoot');
    if (!id){ root.innerHTML = '<div class="container section"><div class="empty">No team specified.</div></div>'; return; }
    var t = await STS.getTeam(id);
    if (!t || (!t.live && t.status!=='active')){
      root.innerHTML = '<div class="container section"><div class="empty"><h2>Team page pending</h2><p class="muted">This team\'s page goes live once their registration payment clears. Check back soon.</p><a class="btn btn-navy" href="teams.html">Browse teams</a></div></div>';
      document.title = 'Team · Small Town Select';
      return;
    }
    document.title = t.name + ' · Small Town Select';

    // ── load this team's full game history (every event), compute record ──
    var ALL=[], FORMS=[];
    try { ALL = await STS.loadGames(); FORMS = await STS.loadForms(); } catch(e){}
    function titleFor(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return f?f.title:fid; }
    function schedPub(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return !f || f.schedule_published!==false; }
    var brk={};
    function bt(fid){ return brk[fid] || (brk[fid]={ games: ALL.filter(function(x){ return x.form_id===fid && x.g!=null; }) }); }
    function sideName(g, raw){ if(g.g==null || !window.STSbracket) return raw==null?'':String(raw); var sd=STSbracket.sideDisplay(bt(g.form_id), raw); return sd.tbd?'':sd.name; }
    function isChamp(g){ if(g.g==null || !window.STSbracket) return false; try{ return STSbracket.classify(bt(g.form_id))[g.g]==='f'; }catch(e){ return false; } }
    var TN = (t.name||'').toLowerCase().trim();
    var results=[];
    ALL.forEach(function(g){
      if(!(g.done && g.away_score!=null && g.home_score!=null)) return;
      if(!schedPub(g.form_id)) return;
      var aN=sideName(g,g.away), hN=sideName(g,g.home);
      var isAway = aN.toLowerCase().trim()===TN, isHome = hN.toLowerCase().trim()===TN;
      if(!isAway && !isHome) return;
      var my=isAway?g.away_score:g.home_score, op=isAway?g.home_score:g.away_score, opp=isAway?hN:aN;
      results.push({ date:g.date||'', event:titleFor(g.form_id), opp:opp, my:my, op:op, res:(my>op?'W':(op>my?'L':'T')), champ:isChamp(g) });
    });
    results.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    var rec={w:0,l:0,t:0,rs:0,ra:0};
    results.forEach(function(r){ rec.rs+=r.my; rec.ra+=r.op; if(r.res==='W')rec.w++; else if(r.res==='L')rec.l++; else rec.t++; });
    var gp=rec.w+rec.l+rec.t, ardiff=gp?((rec.rs-rec.ra)/gp):0;
    var gamesHTML = results.length
      ? '<div class="table-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Event</th><th>Opponent</th><th>Result</th></tr></thead><tbody>'+
        results.map(function(r){ var rc=r.res==='W'?'gw':(r.res==='L'?'gl':'gt');
          var oppCell = r.opp ? '<a href="team.html?id='+esc(slugify(r.opp))+'">'+esc(r.opp)+'</a>' : '<span class="muted">TBD</span>';
          return '<tr><td>'+esc(fmtDate(r.date))+'</td><td>'+esc(r.event)+(r.champ?' <span class="gh-trophy" title="Championship game">🏆</span>':'')+'</td>'+
            '<td>'+oppCell+'</td>'+
            '<td class="'+rc+'"><b>'+r.res+'</b> '+r.my+'–'+r.op+'</td></tr>'; }).join('')+
        '</tbody></table></div>'
      : '<div class="empty">No games played yet — results appear here as scores are posted.</div>';

    var logo = '<img src="assets/logos/'+esc(t.slug||t.id)+'.png" alt="'+esc(t.name)+' logo" loading="lazy" onerror="this.remove()">'+esc(STS.abbr(t.name));
    var meta = [t.division, t.age_class, t.sport, t.town, (t.coach_name?'Coach '+t.coach_name:'')].filter(Boolean).map(function(m){ return '<span>'+esc(m)+'</span>'; }).join('');
    var roster = (t.roster||[]);
    var rosterHTML = roster.length
      ? '<div class="table-wrap"><table class="tbl roster-table"><thead><tr><th>#</th><th>Player</th><th>Grade</th></tr></thead><tbody>'+
        roster.map(function(p){ return '<tr><td class="jersey">'+esc(p.num||'')+'</td><td>'+esc(p.name||'')+'</td><td>'+esc(p.grade||'')+'</td></tr>'; }).join('')+
        '</tbody></table></div>'
      : '<div class="empty">No roster posted yet. The coach can add players with their team code.</div>';
    var tourneys = (t.tournaments||[]);
    var tourneyHTML = tourneys.length
      ? '<div class="card-grid">'+tourneys.map(function(name){ return '<div class="card"><div class="eyebrow">Registered</div><h3 style="margin:4px 0 0">'+esc(name)+'</h3></div>'; }).join('')+'</div>'
      : '<div class="empty">Not registered for any tournaments yet.</div>';
    var record = gp ? ('<span>'+rec.w+'–'+rec.l+(rec.t?'–'+rec.t:'')+'</span><span>'+(ardiff>0?'+':'')+ardiff.toFixed(1)+' ARDiff</span>') : '';

    root.innerHTML =
      '<div class="team-hero"><div class="container"><div class="th-inner">'+
        '<div class="team-logo">'+logo+'</div>'+
        '<div><h1>'+esc(t.name)+'</h1><div class="th-meta">'+meta+record+'</div></div>'+
        '<div style="margin-left:auto"><a class="btn btn-gold btn-sm" href="roster-edit.html?id='+esc(t.slug||t.id)+'">Edit Roster</a></div>'+
      '</div></div></div>'+
      '<main class="container section">'+
        '<div class="sec-head"><h2>Games</h2><span class="muted" style="font-size:var(--text-sm)">'+(gp?(rec.rs+' RS · '+rec.ra+' RA · '+gp+' game'+(gp===1?'':'s')):'')+'</span></div>'+gamesHTML+
        '<div class="sec-head mt-7"><h2>Roster</h2><span class="muted" style="font-size:var(--text-sm)">'+roster.length+' player'+(roster.length===1?'':'s')+'</span></div>'+rosterHTML+
        '<div class="sec-head mt-7"><h2>Tournaments</h2></div>'+tourneyHTML+
      '</main>';
    if (window.STSfx) STSfx.arm(document);
  })();
</script>

</body>
</html>
