<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Team · Small Town Select Tournaments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css?v=9" />
<style>
  .tbl td.gw b { color: #047857; }
  .tbl td.gl b { color: var(--sts-red); }
  .tbl td.gt b { color: var(--muted); }
  .gh-trophy { font-size: 13px; }
  .ts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(108px, 1fr)); gap: 12px; }
  .ts-stat { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 10px; text-align: center; }
  .ts-stat .n { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--sts-navy); line-height: 1; letter-spacing: .01em; }
  .ts-stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-top: 7px; }
  .pl-namelink { color: var(--sts-navy); font-weight: 600; text-decoration: none; }
  .pl-namelink:hover { text-decoration: underline; }
  .rost-guest { display: inline-block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; font-size: 9px; font-weight: 700; color: var(--sts-red); border: 1px solid var(--sts-red); border-radius: 4px; padding: 1px 5px; vertical-align: middle; margin-left: 5px; }
  .tbl tr[data-gid] { cursor: pointer; }
  .tbl tr[data-gid]:hover { background: rgba(0,45,114,.05); }
  .g-cue { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--sts-navy); opacity: .55; white-space: nowrap; }
  .cell-spread { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .tf { display: inline-flex; align-items: baseline; gap: 22px; }
  .tf .fld { color: var(--muted); }
  .tw-card { display: block; text-decoration: none; color: inherit; }
  .tw-card .cg-view { margin-top: 8px; color: var(--sts-navy); font-weight: 600; font-size: var(--text-sm); }
</style>
</head>
<body>

<div id="sts-nav"></div>

<div id="teamRoot">
  <div class="team-hero"><div class="container"><div class="th-inner"><div class="team-logo">…</div><div><h1>Loading…</h1></div></div></div></div>
</div>

<div id="sts-footer"></div>

<script src="js/sts-bracket.js"></script>
<script src="js/sts-gamemodal.js"></script>
<script src="js/sts-chrome.js"></script>
<script type="module">
  import * as STS from './js/sts-data.js';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function qs(k){ return new URLSearchParams(location.search).get(k); }
  function slugify(s){ return String(s==null?'':s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(s){ if(!s) return 'TBD'; var d=new Date(s+'T12:00:00'); if(isNaN(d)) return s; return MON[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }

  (async function(){
    var id = qs('id');
    var root = document.getElementById('teamRoot');
    if (!id){ root.innerHTML = '<div class="container section"><div class="empty">No team specified.</div></div>'; return; }
    var t = await STS.getTeam(id);
    if (!t || (!t.live && t.status!=='active')){
      var nm = decodeURIComponent(String(id)).replace(/[-_]+/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      root.innerHTML = '<div class="container section"><div class="empty"><h2>'+esc(nm)+' — page coming soon</h2><p class="muted">This team\'s page isn\'t published yet. It goes live once the team is set up for the season — check back soon.</p><a class="btn btn-navy" href="teams.html">Browse teams</a></div></div>';
      document.title = 'Team · Small Town Select';
      return;
    }
    document.title = t.name + ' · Small Town Select';

    // ── load this team's full game history (every event), compute record ──
    var ALL=[], FORMS=[], TEAMS=[];
    try { ALL = await STS.loadGames(); FORMS = await STS.loadForms(); } catch(e){}
    try { TEAMS = await STS.loadTeams(); } catch(e){}
    var teamSlugSet={}; TEAMS.forEach(function(x){ teamSlugSet[(x.slug||x.id)]=1; });
    var resolveTeam = STS.teamResolver(TEAMS);   // opponent NAME → real slug (name+age), null if none
    function titleFor(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return f?f.title:fid; }
    function schedPub(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return !f || f.schedule_published!==false; }
    var brk={};
    function bt(fid){ return brk[fid] || (brk[fid]={ games: ALL.filter(function(x){ return x.form_id===fid && x.g!=null; }) }); }
    function sideName(g, raw){ if(g.g==null || !window.STSbracket) return raw==null?'':String(raw); var sd=STSbracket.sideDisplay(bt(g.form_id), raw); return sd.tbd?'':sd.name; }
    function isChamp(g){ if(g.g==null || !window.STSbracket) return false; try{ return STSbracket.classify(bt(g.form_id))[g.g]==='f'; }catch(e){ return false; } }
    var TN = (t.name||'').toLowerCase().trim();
    function fmtTime(s){ if(!s) return ''; var p=String(s).split(':'); var h=+p[0],m=p[1]||'00'; if(isNaN(h)) return ''; var ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap; }
    var results=[], upcoming=[];
    ALL.forEach(function(g){
      if(!schedPub(g.form_id)) return;
      var aN=sideName(g,g.away), hN=sideName(g,g.home);
      var isAway = aN.toLowerCase().trim()===TN, isHome = hN.toLowerCase().trim()===TN;
      if(!isAway && !isHome) return;
      var opp = isAway?hN:aN;
      if(g.done && g.away_score!=null && g.home_score!=null){
        var my=isAway?g.away_score:g.home_score, op=isAway?g.home_score:g.away_score;
        results.push({ gid:g.id, fid:g.form_id, date:g.date||'', time:g.time||'', event:titleFor(g.form_id), opp:opp, my:my, op:op, res:(my>op?'W':(op>my?'L':'T')), forfeit:!!g.forfeit, forfeit_by:g.forfeit_by||'', champ:isChamp(g) });
      } else {
        upcoming.push({ gid:g.id, fid:g.form_id, date:g.date||'', time:g.time||'', field:g.field||'', event:titleFor(g.form_id), opp:opp });
      }
    });
    // chronological (earliest → latest) by full date+time; empty dates/times sort last
    function gKey(r){ return (r.date||'9999-99-99')+'T'+(r.time||'99:99'); }
    results.sort(function(a,b){ return gKey(a).localeCompare(gKey(b)); });
    upcoming.sort(function(a,b){ return gKey(a).localeCompare(gKey(b)); });
    // ── season tagging — a game belongs to the Aug 1 → Jul 31 season containing its date ──
    function seasonOf(dStr){ if(!dStr) return null; var d=new Date(dStr+'T12:00:00'); if(isNaN(d)) return null; return d.getMonth()>=7 ? d.getFullYear()+1 : d.getFullYear(); }
    results.forEach(function(r){ r.season=seasonOf(r.date); });
    upcoming.forEach(function(r){ r.season=seasonOf(r.date); });
    var seasonList=[]; (function(){ var seen={}; results.concat(upcoming).forEach(function(r){ if(r.season && !seen[r.season]){ seen[r.season]=1; seasonList.push(r.season); } }); seasonList.sort(function(a,b){ return b-a; }); })();

    function recOf(rs){ var rc={w:0,l:0,t:0,rs:0,ra:0}; rs.forEach(function(r){ if(!r.forfeit){ rc.rs+=r.my; rc.ra+=r.op; } if(r.res==='W')rc.w++; else if(r.res==='L')rc.l++; else rc.t++; }); return rc; }
    function tsStat(n,l){ return '<div class="ts-stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>'; }
    function statGridOf(rs){
      var rec=recOf(rs), gp=rec.w+rec.l+rec.t; if(!gp) return '';
      var ardiff=(rec.rs-rec.ra)/gp, rpg=rec.rs/gp, rapg=rec.ra/gp, winPct=(rec.w+0.5*rec.t)/gp;
      var fa=rs.filter(function(r){return r.champ;}).length, ti=rs.filter(function(r){return r.champ&&r.res==='W';}).length;
      return '<div class="ts-grid">'+
        tsStat(rec.w+'–'+rec.l+(rec.t?'–'+rec.t:''),'Record')+ tsStat(winPct.toFixed(3).replace(/^0(?=\.)/,''),'Win %')+
        tsStat(rpg.toFixed(1),'Runs / Game')+ tsStat(rapg.toFixed(1),'Allowed / Game')+
        tsStat((ardiff>0?'+':'')+ardiff.toFixed(1),'Run Diff / Game')+
        tsStat(String(fa),fa===1?'Finals Trip':'Finals Trips')+ tsStat(ti?ti+' 🏆':'0',ti===1?'Title':'Titles')+
      '</div>';
    }
    function recordLine(rs){ var rec=recOf(rs), gp=rec.w+rec.l+rec.t, ti=rs.filter(function(r){return r.champ&&r.res==='W';}).length; return gp ? ('<span>'+rec.w+'–'+rec.l+(rec.t?'–'+rec.t:'')+' record</span>'+(ti?'<span>'+ti+'× 🏆 Champion</span>':'')) : ''; }
    function gamesHTMLOf(rs){
      return rs.length
        ? '<div class="table-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Event</th><th>Opponent</th><th>Result</th></tr></thead><tbody>'+
          rs.map(function(r){ var rc=r.res==='W'?'gw':(r.res==='L'?'gl':'gt'); var oppS=resolveTeam(r.opp);
            var oppCell = r.opp ? (oppS ? '<a href="team.html?id='+esc(oppS)+'">'+esc(r.opp)+'</a>' : esc(r.opp)) : '<span class="muted">TBD</span>';
            return '<tr data-gid="'+esc(r.gid)+'" tabindex="0" title="View recap"><td>'+esc(fmtDate(r.date))+'</td><td>'+esc(r.event)+(r.champ?' <span class="gh-trophy" title="Championship game">🏆</span>':'')+'</td>'+
              '<td>'+oppCell+'</td><td class="'+rc+'"><div class="cell-spread"><span><b>'+r.res+'</b> '+r.my+'–'+r.op+(r.forfeit?' <span class="ff-tag">'+(r.forfeit_by==='both'?'Dbl FFT':'FFT')+'</span>':'')+'</span><span class="g-cue">Recap ›</span></div></td></tr>'; }).join('')+
          '</tbody></table></div>'
        : '<div class="empty">No games played in this span — results appear here as scores are posted.</div>';
    }
    function upcomingHTMLOf(us){
      return us.length
        ? '<div class="table-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Event</th><th>Opponent</th><th>Time &amp; Field</th></tr></thead><tbody>'+
          us.map(function(r){ var oppS=resolveTeam(r.opp);
            var oppCell = r.opp ? (oppS ? '<a href="team.html?id='+esc(oppS)+'">'+esc(r.opp)+'</a>' : esc(r.opp)) : '<span class="muted">TBD</span>';
            var rCity=(function(){ var l=(FORMS.find(function(x){return x.id===r.fid;})||{}).location||''; return l?l.split(',')[0].trim():''; })();
            var fieldLabel = r.field ? (rCity?rCity+' · '+r.field:r.field) : '';
            return '<tr data-gid="'+esc(r.gid)+'" tabindex="0" title="View preview"><td>'+esc(fmtDate(r.date))+'</td><td>'+esc(r.event)+'</td>'+
              '<td>'+oppCell+'</td><td><span class="tf"><b>'+esc(fmtTime(r.time)||'TBD')+'</b>'+(fieldLabel?'<span class="fld">'+esc(fieldLabel)+'</span>':'')+'<span class="g-cue">Preview ›</span></span></td></tr>'; }).join('')+
          '</tbody></table></div>'
        : '';
    }
    function tourneyHTMLOf(rs, us, includeRegistered){
      var tFids={}; rs.concat(us).forEach(function(r){ if(r.fid) tFids[r.fid]=1; });
      if(includeRegistered) (t.tournaments||[]).forEach(function(name){ var f=FORMS.find(function(x){ return x.title===name; }); if(f) tFids[f.id]=1; });
      var tList=Object.keys(tFids).map(function(fid){ return FORMS.find(function(x){ return x.id===fid; }); }).filter(function(f){ return f && f.type==='tournament'; });
      function hasBracket(fid){ return ALL.some(function(g){ return g.form_id===fid && g.g!=null; }); }
      return tList.length
        ? '<div class="card-grid">'+tList.map(function(f){
            var hb=hasBracket(f.id); var m=[f.event_dates, f.location].filter(Boolean).join(' · ');
            return '<a class="card tw-card" href="event.html?id='+encodeURIComponent(f.id)+'"><div class="eyebrow">'+(hb?'Tournament':'Registered')+'</div><h3 style="margin:4px 0 0">'+esc(f.title)+'</h3>'+(m?'<div class="muted" style="font-size:var(--text-sm);margin-top:4px">'+esc(m)+'</div>':'')+'<div class="cg-view">View tournament →</div></a>';
          }).join('')+'</div>'
        : '<div class="empty">No tournaments in this span.</div>';
    }

    var logo = '<img src="assets/logos/'+esc(t.slug||t.id)+'.png" alt="'+esc(t.name)+' logo" loading="lazy" onerror="this.remove()">'+esc(STS.abbr(t.name));
    var meta = [t.division, t.age_class, t.sport, t.town, (t.coach_name?'Coach '+t.coach_name:'')].filter(Boolean).map(function(m){ return '<span>'+esc(m)+'</span>'; }).join('');
    var roster = (t.roster||[]);
    var rosterHTML = roster.length
      ? '<div class="table-wrap"><table class="tbl roster-table"><thead><tr><th>#</th><th>Player</th><th title="Age as of the May 1 eligibility cutoff">Age (5/1)</th><th>Grade</th></tr></thead><tbody>'+
        roster.map(function(p,i){
          var nm=(p.name||'').trim();
          var gev = (p.guest && Array.isArray(p.guest_events) && p.guest_events.length) ? ' <span class="rost-guest" style="color:var(--muted);border-color:var(--line)">'+esc(p.guest_events.join(' · '))+'</span>' : '';
          var nameCell = nm ? '<a class="pl-namelink" href="player.html?t='+esc(t.slug||t.id)+'&i='+i+'">'+esc(nm)+'</a>'+(p.guest?' <span class="rost-guest">Guest</span>':'')+gev : '';
          return '<tr><td class="jersey">'+esc(p.num||'')+'</td><td>'+nameCell+'</td><td>'+esc(STS.playerAge(p))+'</td><td>'+esc(p.grade||'')+'</td></tr>'; }).join('')+
        '</tbody></table></div>'
      : '<div class="empty">No roster posted yet. The coach can add players with their team code.</div>';

    // Season selector: Total (all-time) + each season year, newest first.
    var seasonBar = (results.length || upcoming.length)
      ? '<div class="pill-tabs" id="seasonBar" style="margin-bottom:var(--space-4)"><button class="pill active" data-season="TOTAL">Total</button>'+
          seasonList.map(function(y){ return '<button class="pill" data-season="'+y+'">'+y+' Season</button>'; }).join('')+'</div>'
      : '';

    function renderSeason(sel){
      var rs = (sel==='TOTAL') ? results : results.filter(function(r){ return String(r.season)===String(sel); });
      var us = (sel==='TOTAL') ? upcoming : upcoming.filter(function(r){ return String(r.season)===String(sel); });
      var sg = statGridOf(rs);
      var html =
        (sg ? '<div class="sec-head"><h2>'+(sel==='TOTAL'?'All-Time Stats':esc(sel)+' Season Stats')+'</h2><span class="muted" style="font-size:var(--text-sm)">'+rs.length+' game'+(rs.length===1?'':'s')+'</span></div>'+sg : '')+
        (us.length ? '<div class="sec-head'+(sg?' mt-7':'')+'"><h2>Upcoming Schedule</h2><span class="muted" style="font-size:var(--text-sm)">'+us.length+' game'+(us.length===1?'':'s')+' · tap for preview</span></div>'+upcomingHTMLOf(us) : '')+
        '<div class="sec-head'+((sg||us.length)?' mt-7':'')+'"><h2>'+(us.length?'Results':'Games')+'</h2>'+(rs.length?'<span class="muted" style="font-size:var(--text-sm)">tap for recap</span>':'')+'</div>'+gamesHTMLOf(rs)+
        '<div class="sec-head mt-7"><h2>Tournaments</h2></div>'+tourneyHTMLOf(rs, us, sel==='TOTAL');
      document.getElementById('seasonContent').innerHTML = html;
      var rl=document.getElementById('thRecord'); if(rl) rl.innerHTML = recordLine(rs);
    }

    root.innerHTML =
      '<div class="team-hero"><div class="container"><div class="th-inner">'+
        '<div class="team-logo">'+logo+'</div>'+
        '<div><h1>'+esc(t.name)+'</h1><div class="th-meta">'+meta+'<span id="thRecord"></span></div></div>'+
        '<div style="margin-left:auto"><a class="btn btn-gold btn-sm" href="roster-edit.html?id='+esc(t.slug||t.id)+'">Edit Roster</a></div>'+
      '</div></div></div>'+
      '<main class="container section">'+
        seasonBar +
        '<div id="seasonContent"></div>'+
        '<div class="sec-head mt-7"><h2>Roster</h2><span class="muted" style="font-size:var(--text-sm)">'+roster.length+' player'+(roster.length===1?'':'s')+'</span></div>'+rosterHTML+
      '</main>';

    // wire the season pills + initial render (default = Total / all-time)
    var sbar=document.getElementById('seasonBar');
    if(sbar) sbar.addEventListener('click', function(e){ var b=e.target.closest('.pill'); if(!b) return; sbar.querySelectorAll('.pill').forEach(function(p){ p.classList.toggle('active', p===b); }); renderSeason(b.dataset.season); });
    renderSeason('TOTAL');

    // click/Enter a game row → open the preview (upcoming) / recap (played) modal
    function openGameRow(row){
      if(!window.STSgameModal) return;
      var g = ALL.find(function(x){ return String(x.id)===String(row.getAttribute('data-gid')); });
      if(!g) return;
      var evGames = ALL.filter(function(x){ return x.form_id===g.form_id; });
      STSgameModal.open(titleFor(g.form_id), evGames, g, (FORMS.find(function(x){return x.id===g.form_id;})||{}).location||'');
    }
    root.addEventListener('click', function(e){
      if(e.target.closest('a')) return;            // let opponent/team links navigate
      var row=e.target.closest('tr[data-gid]'); if(row) openGameRow(row);
    });
    root.addEventListener('keydown', function(e){
      if(e.key!=='Enter' && e.key!==' ') return;
      var row=e.target.closest('tr[data-gid]'); if(row){ e.preventDefault(); openGameRow(row); }
    });
    if (window.STSfx) STSfx.arm(document);
  })();
</script>

</body>
</html>
