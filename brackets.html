<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Brackets · Small Town Select Tournaments</title>
<meta name="description" content="Live single- and double-elimination brackets — winners advance automatically as scores post." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Saira+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css?v=9" />
</head>
<body>

<div id="sts-nav"></div>

<header class="page-banner page-banner-full"><img src="assets/headers/brackets.png?v=8" alt="Brackets — Small Town Select Tournaments" /><h1 class="sr-only">Brackets</h1></header>

<main class="container section">
  <div class="toolbar" style="align-items:center">
    <select class="input" id="eventSel" aria-label="Select tournament bracket" style="max-width:340px"></select>
    <a class="btn btn-navy btn-sm" id="hubLink" href="#" style="white-space:nowrap;display:none">Full tournament page ↗</a>
    <div class="bk-legend">
      <span><span class="chip w"></span> Winners bracket</span>
      <span><span class="chip l"></span> Losers bracket</span>
      <span><span class="chip f"></span> Championship</span>
      <div class="bk-tools">
        <div class="bk-zoomctl"><button type="button" id="zoomOut" aria-label="Zoom out">−</button><span id="zoomLabel">100%</span><button type="button" id="zoomIn" aria-label="Zoom in">+</button></div>
        <button type="button" class="bk-tool-btn" id="zoomFit">Fit</button>
        <a class="bk-tool-btn" href="bracket-preview.html" style="text-decoration:none;display:inline-flex;align-items:center">Examples</a>
      </div>
    </div>
  </div>
  <div class="pill-tabs" id="seasonPills" style="display:none;margin:0 0 var(--space-3)"></div>
  <div class="pill-tabs" id="tierBar" style="display:none;margin:0 0 var(--space-4)"></div>
  <div id="bracketOut"><div class="bk-empty">Loading brackets…</div></div>
  <div class="notice notice-info mt-5"><b>Live bracket.</b> When a score is posted, the winner advances automatically — “Winner of Game 5” becomes the actual team, and the line carries them to the next round.</div>
</main>

<div id="sts-footer"></div>

<script src="js/sts-bracket.js"></script>
<script src="js/sts-bracket-render.js"></script>
<script src="js/sts-gamemodal.js"></script>
<script src="js/sts-chrome.js"></script>
<script type="module">
  import * as STS from './js/sts-data.js';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  var GAMES=[], FORMS=[], TEAMS=[], resolveTeam=function(){ return null; }, cur='', curDiv='', ZOOM=1, CURBG=[], ALLOPTS=[], SEASON='';
  function eventSeason(fid){ var g=GAMES.find(function(x){ return x.form_id===fid && x.date; }); return g?STS.seasonOf(g.date):null; }
  function eventsForSeason(){ return ALLOPTS.filter(function(f){ return !SEASON || String(eventSeason(f.id))===String(SEASON); }); }
  function fillEvents(){
    var opts=eventsForSeason();
    // With more than one tournament, don't pick for the user — add a "choose one" prompt
    // and leave it unselected. With exactly one, open it automatically.
    var ph = opts.length>1 ? '<option value="">Choose a tournament…</option>' : '';
    document.getElementById('eventSel').innerHTML = ph + opts.map(function(f){ return '<option value="'+esc(f.id)+'">'+esc(f.title)+'</option>'; }).join('');
    if(!opts.find(function(f){ return f.id===cur; })){ cur = (opts.length===1 ? opts[0].id : ''); curDiv=''; }
    document.getElementById('eventSel').value=cur;
  }
  function buildSeasonBar(){
    var seen={}, ys=[]; ALLOPTS.forEach(function(f){ var s=eventSeason(f.id); if(s && !seen[s]){ seen[s]=1; ys.push(s); } }); ys.sort(function(a,b){ return b-a; });
    var bar=document.getElementById('seasonPills');
    if(ys.length<2){ bar.style.display='none'; return; }
    SEASON=String(ys[0]);
    bar.style.display='';
    bar.innerHTML = ys.map(function(y,i){ return '<button class="pill'+(i===0?' active':'')+'" data-season="'+y+'">'+y+'</button>'; }).join('') + '<button class="pill" data-season="">All</button>';
  }
  function titleFor(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return f?f.title:fid; }
  // A pool-play tournament (has round-robin games) belongs on its full hub page, not
  // the bracket-only view. Pure single/double elim shows the bracket alone.
  function isPool(fid){ return GAMES.some(function(g){ return g.form_id===fid && g.g==null; }); }
  function demoQS(){ return /[?&]demo=1/.test(location.search) ? '&demo=1' : ''; }

  function applyZoom(){ var z=document.querySelector('#bracketOut .bk-zoomable'); if(z) z.style.zoom=ZOOM; document.getElementById('zoomLabel').textContent=Math.round(ZOOM*100)+'%'; }
  // pool standings for the selected event/division (the games that seed this bracket)
  function poolStandingsHTML(){
    var pool = GAMES.filter(function(g){ return g.form_id===cur && g.g==null && (g.division||'')===curDiv; });
    if(!pool.length) return '';
    var st = STS.computeStandings(pool, {includeAll:true}); if(!st.length) return '';
    var rows = st.map(function(r,i){ var slug=resolveTeam(r.team,curDiv)||STS.slugify(r.team); var tn='<a href="team.html?id='+encodeURIComponent(slug)+demoQS()+'" style="color:var(--sts-navy);text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+esc(r.team)+'</a>'; return '<tr><td class="rank">'+(i+1)+'</td><td>'+tn+'</td><td>'+r.w+'</td><td>'+r.l+'</td><td>'+r.ties+'</td><td class="num">'+r.pct.toFixed(3).replace(/^0/,'')+'</td><td>'+(r.diff>0?'+':'')+r.diff+'</td></tr>'; }).join('');
    return '<div style="margin-bottom:var(--space-5)">'+
      '<h3 style="color:var(--sts-navy);margin:0 0 8px;font-size:var(--text-lg)">Pool Standings <span class="muted" style="font-weight:400;font-size:var(--text-sm)">— seeds the bracket below</span></h3>'+
      '<div class="table-wrap"><table class="tbl"><thead><tr><th class="rank">#</th><th>Team</th><th>W</th><th>L</th><th>T</th><th>PCT</th><th>Diff</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }
  function render(){
    var out=document.getElementById('bracketOut'), tierBar=document.getElementById('tierBar');
    // nothing chosen yet (several tournaments available) → prompt the user to pick one
    if(!cur){ if(tierBar){ tierBar.style.display='none'; tierBar.innerHTML=''; } var hb=document.getElementById('hubLink'); if(hb) hb.style.display='none'; out.innerHTML='<div class="bk-empty" style="text-transform:none;letter-spacing:0">Choose a tournament above to view its bracket.</div>'; return; }
    // Pool-play tournaments live on their full tournament page (hero + tabs + standings +
    // bracket) — forward there so they get the real "tournament page" look instead of a
    // bare standings table. Pure-elimination events stay here as a bracket-only view.
    if(cur && isPool(cur)){ location.replace('event.html?id='+encodeURIComponent(cur)+demoQS()+'#bracket'); return; }
    var hub=document.getElementById('hubLink'); if(hub) hub.style.display='none';
    var all = GAMES.filter(function(g){ return g.g!=null && g.form_id===cur; });   // bracket games
    // distinct divisions from ALL of this event's games (pool + bracket) so pool-only
    // tournaments still get a division tab + their pool standings
    var divs=[], seen={}; GAMES.forEach(function(g){ if(g.form_id!==cur) return; var d=g.division||''; if(!seen[d]){ seen[d]=1; divs.push(d); } });
    if(divs.length>1 || (divs.length===1 && divs[0])){
      if(divs.indexOf(curDiv)<0) curDiv=divs[0];
      tierBar.style.display='';
      tierBar.innerHTML = divs.map(function(d){ return '<button class="pill'+(d===curDiv?' active':'')+'" data-div="'+esc(d)+'">'+esc(d||'Bracket')+'</button>'; }).join('');
    } else { tierBar.style.display='none'; tierBar.innerHTML=''; curDiv=divs[0]||''; }
    var bg = all.filter(function(g){ return (g.division||'')===curDiv; });
    CURBG = bg;
    var standsHTML = poolStandingsHTML();
    if(!bg.length){ out.innerHTML = standsHTML || '<div class="bk-empty">No bracket posted for this event yet.</div>'; return; }
    var name = titleFor(cur) + (curDiv ? ' — '+curDiv : '');
    var venue = (FORMS.find(function(x){return x.id===cur;})||{}).location || '';
    out.innerHTML = standsHTML + '<div class="bk-zoomable">'+STSbracketRender.render(bg, { name: name, teamLinks: true, teamHref:function(n){ return resolveTeam(n, curDiv); }, venue: venue, gameLengthMin:((FORMS.find(function(x){return x.id===cur;})||{}).game_length_min)||0 })+'</div>';
    STSbracketRender.wireHover(out);
    ZOOM=1; applyZoom();
    if (window.STSfx) STSfx.arm(document);
  }
  document.getElementById('tierBar').addEventListener('click', function(e){ var b=e.target.closest('.pill'); if(!b) return; curDiv=b.getAttribute('data-div'); render(); });
  // click a bracket card → preview (upcoming) / recap (final) modal
  document.getElementById('bracketOut').addEventListener('click', function(e){
    var card = e.target.closest('.bk-match[data-g]'); if(!card) return;
    var gn = card.getAttribute('data-g');
    var g = CURBG.find(function(x){ return String(x.g)===gn; });
    if(g && window.STSgameModal) STSgameModal.open(titleFor(cur), CURBG, g, (FORMS.find(function(x){return x.id===cur;})||{}).location||'');
  });
  document.getElementById('eventSel').addEventListener('change', function(e){ cur=e.target.value; curDiv=''; render(); location.hash=cur; });
  document.getElementById('seasonPills').addEventListener('click', function(e){ var b=e.target.closest('.pill'); if(!b) return; SEASON=b.dataset.season; document.querySelectorAll('#seasonPills .pill').forEach(function(p){p.classList.toggle('active',p===b);}); fillEvents(); render(); });
  document.getElementById('zoomIn').addEventListener('click', function(){ ZOOM=Math.min(1.4,Math.round((ZOOM+0.1)*10)/10); applyZoom(); });
  document.getElementById('zoomOut').addEventListener('click', function(){ ZOOM=Math.max(0.4,Math.round((ZOOM-0.1)*10)/10); applyZoom(); });
  document.getElementById('zoomFit').addEventListener('click', function(){
    var c=document.querySelector('#bracketOut .bk-canvas'); var z=document.querySelector('#bracketOut .bk-zoomable'); if(!c||!z) return;
    z.style.zoom=1; var main=document.querySelector('main.container'); var avail=(main?main.clientWidth:window.innerWidth)-6;
    ZOOM = c.offsetWidth>0 ? Math.round(Math.max(0.4,Math.min(1,avail/c.offsetWidth))*100)/100 : 1; applyZoom();
  });

  (async function(){
    try {
      FORMS = await STS.loadForms(); GAMES = await STS.loadGames();
      TEAMS = await STS.loadTeams(); resolveTeam = STS.teamResolver(TEAMS);
      // any published event with games (pool OR bracket) — so pool-only tournaments
      // still appear here to show their pool standings before a bracket exists
      var withG={}; GAMES.forEach(function(g){ if(g.g!=null||g.g==null) withG[g.form_id]=1; });
      ALLOPTS = FORMS.filter(function(f){ return withG[f.id] && f.schedule_published !== false; });
      if(!ALLOPTS.length){ document.getElementById('bracketOut').innerHTML='<div class="bk-empty"><h2 style="color:var(--sts-navy);margin:0 0 8px">No brackets yet</h2><p class="muted" style="text-transform:none;letter-spacing:0">Brackets post here once tournament play begins. See <a href="bracket-preview.html">example brackets</a> for every team count.</p></div>'; document.getElementById('eventSel').style.display='none'; return; }
      buildSeasonBar();
      var deep = location.hash.replace('#','');
      // if deep-linked to a specific event, jump to that event's season so it's listed
      if(deep && ALLOPTS.find(function(f){return f.id===deep;})){ var ds=eventSeason(deep); if(ds && SEASON) SEASON=String(ds); document.querySelectorAll('#seasonPills .pill').forEach(function(p){ p.classList.toggle('active', p.dataset.season===String(ds)); }); cur=deep; }
      fillEvents();
      render();
    } catch(e){ document.getElementById('bracketOut').innerHTML='<div class="bk-empty">Could not load brackets.</div>'; }
  })();
</script>

</body>
</html>
