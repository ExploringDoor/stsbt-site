<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Player · Small Town Select Tournaments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css?v=3" />
<style>
  .pl-hero { background: linear-gradient(135deg, var(--sts-navy), #001a3d); color: #fff; }
  .pl-hero .container { padding-block: var(--space-7); }
  .pl-hero h1 { color: #fff; margin: 0; }
  .pl-sub { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 10px; color: rgba(255,255,255,.82); font-size: var(--text-sm); text-transform: uppercase; letter-spacing: .04em; }
  .pl-avatar { width: 64px; height: 64px; border-radius: 50%; background: #fff; color: var(--sts-navy); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 24px; flex-shrink: 0; }
  .pl-head-row { display: flex; align-items: center; gap: 16px; }
  .pl-teams { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .pl-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; text-decoration: none; transition: border-color .14s, transform .14s; }
  .pl-card:hover { border-color: var(--sts-navy); transform: translateY(-2px); }
  .pl-card .lg { width: 44px; height: 44px; border-radius: 50%; background: var(--sts-navy); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 15px; flex-shrink: 0; overflow: hidden; }
  .pl-card .lg img { width: 100%; height: 100%; object-fit: cover; }
  .pl-card .tn { display: block; font-family: var(--font-display); font-weight: 700; color: var(--sts-navy); line-height: 1.15; }
  .pl-card .td { display: block; font-size: var(--text-xs); color: var(--muted); margin-top: 3px; }
  .pl-jersey { margin-left: auto; font-family: var(--font-display); font-weight: 700; color: var(--muted); font-size: var(--text-sm); }
  .pl-guest { display: inline-block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; font-size: 9px; font-weight: 700; color: var(--sts-red); border: 1px solid var(--sts-red); border-radius: 4px; padding: 1px 5px; vertical-align: middle; margin-left: 5px; }
  .tbl td.gw b { color: #047857; }
  .tbl td.gl b { color: var(--sts-red); }
  .tbl td.gt b { color: var(--muted); }
  .pl-note { color: var(--muted); font-size: var(--text-xs); margin-top: 18px; }
</style>
</head>
<body>

<div id="sts-nav"></div>

<div id="plRoot">
  <div class="pl-hero"><div class="container"><h1>Loading…</h1></div></div>
</div>

<div id="sts-footer"></div>

<script src="js/sts-bracket.js"></script>
<script src="js/sts-chrome.js"></script>
<script type="module">
  import * as STS from './js/sts-data.js';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function qs(k){ return new URLSearchParams(location.search).get(k); }
  function norm(s){ return String(s==null?'':s).toLowerCase().trim(); }
  function slugify(s){ return String(s==null?'':s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
  function initials(name){ var p=String(name||'').trim().split(/\s+/); return (((p[0]||'')[0]||'')+((p[1]||'')[0]||'')||'?').toUpperCase(); }
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(s){ if(!s) return 'TBD'; var d=new Date(s+'T12:00:00'); if(isNaN(d)) return s; return MON[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }

  (async function(){
    var root = document.getElementById('plRoot');
    var tslug = qs('t'), idx = parseInt(qs('i'), 10);
    if (!tslug || isNaN(idx)) { root.innerHTML = '<div class="container section"><div class="empty">No player specified.</div></div>'; return; }

    var team = await STS.getTeam(tslug);
    // Same privacy gate as team.html — a player on a not-yet-public (unpaid/pending)
    // team must not be exposed via the player page.
    if (team && !team.live && team.status!=='active') {
      root.innerHTML = '<div class="container section"><div class="empty"><h2>Player page pending</h2><p class="muted">This player\'s team goes live once their registration payment clears. Check back soon.</p><a class="btn btn-navy" href="teams.html">Browse teams</a></div></div>';
      document.title = 'Player · Small Town Select';
      return;
    }
    var p = team && (team.roster||[])[idx];
    if (!team || !p || !(p.name||'').trim()) {
      root.innerHTML = '<div class="container section"><div class="empty"><h2>Player not found</h2><p class="muted">This roster spot may have changed. Head back to the team page.</p><a class="btn btn-navy" href="team.html?id='+esc(tslug)+'">Back to team</a></div></div>';
      return;
    }
    var pname = (p.name||'').trim(), pdob = (p.dob||'').trim();
    document.title = pname + ' · Small Town Select';

    var all = [], ALL = [], FORMS = [];
    try { all = await STS.loadTeams(); } catch(e){}
    try { ALL = await STS.loadGames(); FORMS = await STS.loadForms(); } catch(e){}

    // ── this player's appearances across every team (rostered + guest), matched
    //    by name + date of birth. No DOB on file → only the clicked team, so two
    //    different same-named players never merge. ──
    // Identity priority: stable non-PII pid (public docs carry this, not dob) →
    // name+dob (sample/local only) → same-team-only when neither is available.
    var ppid = (p.pid||'').trim();
    var seen = {}, appearances = [];
    all.forEach(function(tm){
      (tm.roster||[]).forEach(function(rp){
        var m;
        if (ppid) m = (rp.pid||'') === ppid;
        else if (pdob) m = norm(rp.name)===norm(pname) && (rp.dob||'').trim()===pdob;
        else m = norm(rp.name)===norm(pname) && (tm.slug||tm.id)===(team.slug||team.id);
        if (!m) return;
        var key = tm.slug || tm.id;
        if (seen[key]) return; seen[key] = 1;
        appearances.push({ team: tm, rp: rp, guest: !!rp.guest });
      });
    });
    if (!appearances.length) appearances.push({ team: team, rp: p, guest: !!p.guest });

    // ── game resolution (mirrors team.html: completed + schedule-published +
    //    bracket side resolution) computed per team the player appears on ──
    function titleFor(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return f?f.title:fid; }
    function schedPub(fid){ var f=FORMS.find(function(x){return x.id===fid;}); return !f || f.schedule_published!==false; }
    var brk={};
    function bt(fid){ return brk[fid] || (brk[fid]={ games: ALL.filter(function(x){ return x.form_id===fid && x.g!=null; }) }); }
    function sideName(g, raw){ if(g.g==null || !window.STSbracket) return raw==null?'':String(raw); var sd=STSbracket.sideDisplay(bt(g.form_id), raw); return sd.tbd?'':sd.name; }
    function isChamp(g){ if(g.g==null || !window.STSbracket) return false; try{ return STSbracket.classify(bt(g.form_id))[g.g]==='f'; }catch(e){ return false; } }
    function resultsForTeam(tname){
      var TN=norm(tname), out=[];
      ALL.forEach(function(g){
        if(!(g.done && g.away_score!=null && g.home_score!=null)) return;
        if(!schedPub(g.form_id)) return;
        var aN=sideName(g,g.away), hN=sideName(g,g.home);
        var isAway=norm(aN)===TN, isHome=norm(hN)===TN;
        if(!isAway && !isHome) return;
        var my=isAway?g.away_score:g.home_score, op=isAway?g.home_score:g.away_score, opp=isAway?hN:aN;
        out.push({ id:g.id, date:g.date||'', event:titleFor(g.form_id), opp:opp, my:my, op:op, res:(my>op?'W':(op>my?'L':'T')), champ:isChamp(g) });
      });
      return out;
    }

    // player game log = union of every team's games, deduped by PHYSICAL GAME id so
    // one game is never listed twice (e.g. when the player is rostered on one team
    // and a guest on the opposing team). Rostered teams are processed before guest
    // teams so a shared game is attributed to the rostered side. Two distinct games
    // (double-headers, rematches) keep their own id and both appear.
    var games = [], gseen = {};
    appearances.slice().sort(function(a,b){ return (a.guest?1:0)-(b.guest?1:0); }).forEach(function(a){
      resultsForTeam(a.team.name).forEach(function(r){
        var k = r.id != null ? ('id:'+r.id) : (a.team.name + '|' + r.date + '|' + r.opp + '|' + r.my + '-' + r.op);
        if (gseen[k]) return; gseen[k] = 1;
        games.push(Object.assign({}, r, { teamName:a.team.name, teamSlug:(a.team.slug||a.team.id), guest:a.guest }));
      });
    });
    games.sort(function(x,y){ return (y.date||'').localeCompare(x.date||''); });

    // ── render ──
    var rostered = appearances.filter(function(a){ return !a.guest; });
    var guests = appearances.filter(function(a){ return a.guest; });
    var grade = (p.grade||'').trim();
    var age = STS.playerAge(p);
    var sub = [ age !== '' ? '<span title="Age as of the May 1 eligibility cutoff">Age '+esc(age)+'</span>' : '',
                grade ? 'Grade ' + esc(grade) : '',
                appearances.length + ' team' + (appearances.length===1?'':'s'),
                games.length ? (games.length + ' game' + (games.length===1?'':'s')) : '' ]
      .filter(Boolean).map(function(s){ return s.indexOf('<span')===0 ? s : '<span>'+s+'</span>'; }).join('');

    function teamCard(a){
      var tm = a.team, slug = tm.slug || tm.id;
      var logo = '<img src="assets/logos/'+esc(slug)+'.png" alt="" loading="lazy" onerror="this.remove()">'+esc(STS.abbr(tm.name));
      var line2 = [tm.division, tm.age_class, tm.town].filter(Boolean).join(' · ');
      var jersey = (a.rp.num||'').toString().trim();
      return '<a class="pl-card" href="team.html?id='+esc(slug)+'">'+
        '<span class="lg">'+logo+'</span>'+
        '<span><span class="tn">'+esc(tm.name)+(a.guest?' <span class="pl-guest">Guest</span>':'')+'</span><span class="td">'+esc(line2)+'</span></span>'+
        (jersey ? '<span class="pl-jersey">#'+esc(jersey)+'</span>' : '')+
      '</a>';
    }

    // only link an opponent when its name slugifies to a real team page (avoids
    // wrong-team / dead links for names that don't map to a team doc)
    var teamSlugSet = {}; all.forEach(function(t){ teamSlugSet[(t.slug||t.id)] = 1; });
    var gamesHTML = games.length
      ? '<div class="table-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Team</th><th>Opponent</th><th>Result</th></tr></thead><tbody>'+
        games.map(function(r){ var rc=r.res==='W'?'gw':(r.res==='L'?'gl':'gt');
          var oppSlug = slugify(r.opp);
          var oppCell = r.opp ? (teamSlugSet[oppSlug] ? '<a href="team.html?id='+esc(oppSlug)+'">'+esc(r.opp)+'</a>' : esc(r.opp)) : '<span class="muted">TBD</span>';
          var teamCell = '<a href="team.html?id='+esc(r.teamSlug)+'">'+esc(r.teamName)+'</a>'+(r.guest?' <span class="pl-guest">Guest</span>':'')+(r.champ?' <span title="Championship game">🏆</span>':'');
          return '<tr><td>'+esc(fmtDate(r.date))+'</td><td>'+teamCell+'</td><td>'+oppCell+'</td><td class="'+rc+'"><b>'+r.res+'</b> '+r.my+'–'+r.op+'</td></tr>'; }).join('')+
        '</tbody></table></div>'
      : '<div class="empty">No games played yet — games show here as scores are posted for this player\'s teams.</div>';

    var teamsHTML = rostered.length
      ? '<div class="pl-teams">'+rostered.map(teamCard).join('')+'</div>'
      : '<div class="empty">No rostered team on file.</div>';
    var guestHTML = guests.length
      ? '<div class="sec-head mt-7"><h2>Guest Appearances</h2><span class="muted" style="font-size:var(--text-sm)">Pickup / guest player</span></div><div class="pl-teams">'+guests.map(teamCard).join('')+'</div>'
      : '';

    root.innerHTML =
      '<div class="pl-hero"><div class="container">'+
        '<div class="pl-head-row"><span class="pl-avatar">'+esc(initials(pname))+'</span>'+
        '<div><h1>'+esc(pname)+'</h1><div class="pl-sub">'+sub+'</div></div></div>'+
      '</div></div>'+
      '<main class="container section">'+
        '<div class="sec-head"><h2>Games</h2><span class="muted" style="font-size:var(--text-sm)">'+(games.length?games.length+' played':'')+'</span></div>'+gamesHTML+
        '<div class="sec-head mt-7"><h2>Teams</h2></div>'+teamsHTML+
        guestHTML+
        '<p class="pl-note">Games shown are those played by this player\'s teams. Ages are as of the May 1 eligibility cutoff — birthdates are never shown publicly.</p>'+
      '</main>';
    if (window.STSfx) STSfx.arm(document);
  })();
</script>

</body>
</html>
