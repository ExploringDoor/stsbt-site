<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Teams · Small Town Select Tournaments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css?v=9" />
<style>
  .team-card { display: flex; align-items: center; gap: var(--space-4); background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: var(--space-4); text-decoration: none; color: var(--fg); transition: transform .15s ease, box-shadow .15s ease; }
  .team-card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(0,45,114,.14); text-decoration: none; }
  .team-card .sts-logo { width: 52px; height: 52px; font-size: 18px; }
  .tc-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .team-card .tc-name { font-family: var(--font-display); font-weight: 600; color: var(--sts-navy); font-size: var(--text-lg); line-height: 1.15; }
  .team-card .tc-meta { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
  .tc-pill { align-self: flex-start; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-top: 2px; }
  .tc-rec { margin-left: auto; text-align: right; flex: none; padding-left: 8px; }
  .tc-rec b { display: block; font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); color: var(--sts-navy); }
  .tc-rec small { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .tm-class { margin-bottom: var(--space-6); }
  .tm-class-head { display: flex; align-items: baseline; gap: 12px; margin: 0 0 var(--space-3); border-bottom: 2px solid var(--sts-navy); padding-bottom: 6px; }
  .tm-class-head h2 { margin: 0; color: var(--sts-navy); font-size: var(--text-xl); }
  .tm-class-head .cnt { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; font-size: var(--text-xs); color: var(--muted); }
</style>
</head>
<body>

<div id="sts-nav"></div>

<header class="page-banner page-banner-full"><img src="assets/headers/teams.png?v=8" alt="Teams — Small Town Select Tournaments" /><h1 class="sr-only">Teams</h1></header>

<main class="container section">
  <div class="toolbar">
    <input class="input grow" id="teamSearch" placeholder="Search teams…" />
    <div class="pill-tabs" id="sportPills">
      <button class="pill active" data-sport="">All</button>
      <button class="pill" data-sport="baseball">Baseball</button>
      <button class="pill" data-sport="softball">Softball</button>
    </div>
  </div>
  <div id="teamGrid"><div class="empty">Loading teams…</div></div>
</main>

<div id="sts-footer"></div>

<script src="js/sts-logos.js"></script>
<script src="js/sts-chrome.js"></script>
<script type="module">
  import * as STS from './js/sts-data.js';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  var ALL = [], filt = { q:'', sport:'' }, REC = {};

  function classOf(t){ return t.division || t.age_class || 'Other'; }
  function classOrder(){ var D=(window.LEAGUE_CONFIG&&LEAGUE_CONFIG.divisions)||{}, out=[]; ['baseball','softball'].forEach(function(s){ (D[s]||[]).forEach(function(d){ out.push(d.name); }); }); return out; }
  var DIV_COLOR = { 'Minors':'#1D9E75', 'Triple-A':'#185FA5', 'Majors':'#B91C1C', 'Class A':'#7C3AED', 'Class B':'#C9A227', 'Class C':'#0F766E' };
  function divColor(d){ return DIV_COLOR[d] || '#002D72'; }
  function teamCard(t){
    var meta = [t.town, (t.coach_name?'Coach '+t.coach_name:'')].filter(Boolean).join(' · ');
    var logo = window.STSlogos ? STSlogos.html(t.name, 52, t.slug||t.id) : '<span class="sts-logo">'+esc(STS.abbr(t.name))+'</span>';
    var c = divColor(t.division);
    var tag = t.age_class || t.division || '';
    var pill = tag ? '<span class="tc-pill" style="background:'+c+'1f;color:'+c+'">'+esc(tag)+'</span>' : '';
    var rc = REC[String(t.name).toLowerCase()] || { w:Number(t.w)||0, l:Number(t.l)||0, ties:Number(t.ties)||0 };
    var gp = (rc.w||0)+(rc.l||0)+(rc.ties||0);
    var rec = gp>0 ? '<span class="tc-rec"><b>'+(rc.w||0)+'–'+(rc.l||0)+((rc.ties||0)?'–'+rc.ties:'')+'</b><small>Record</small></span>' : '';
    return '<a class="team-card" href="team.html?id='+esc(t.slug||t.id)+'">'+logo+
      '<span class="tc-main"><span class="tc-name">'+esc(t.name)+'</span>'+(meta?'<span class="tc-meta">'+esc(meta)+'</span>':'')+pill+'</span>'+rec+'</a>';
  }
  function render(){
    var grid = document.getElementById('teamGrid');
    var rows = ALL.filter(function(t){
      if (filt.sport && t.sport!==filt.sport) return false;
      if (filt.q && (t.name+' '+(t.town||'')).toLowerCase().indexOf(filt.q.toLowerCase())<0) return false;
      return true;
    });
    if (!rows.length){ grid.innerHTML = '<div class="empty">No teams match.</div>'; return; }
    // group by classification
    var groups = {};
    rows.forEach(function(t){ var c=classOf(t); (groups[c]=groups[c]||[]).push(t); });
    var order = classOrder();
    var keys = Object.keys(groups).sort(function(a,b){
      var ia=order.indexOf(a), ib=order.indexOf(b);
      if (ia<0 && ib<0){ if(a==='Other') return 1; if(b==='Other') return -1; return a.localeCompare(b); }
      if (ia<0) return 1; if (ib<0) return -1; return ia-ib;
    });
    grid.innerHTML = keys.map(function(c){
      var teams = groups[c].slice().sort(function(a,b){ return String(a.name).localeCompare(String(b.name)); });
      return '<div class="tm-class"><div class="tm-class-head"><h2>'+esc(c)+'</h2><span class="cnt">'+teams.length+' team'+(teams.length===1?'':'s')+'</span></div>'+
        '<div class="card-grid">'+teams.map(teamCard).join('')+'</div></div>';
    }).join('');
    if (window.STSfx) STSfx.arm(document);
  }
  document.getElementById('teamSearch').addEventListener('input', function(e){ filt.q=e.target.value; render(); });
  document.getElementById('sportPills').addEventListener('click', function(e){ var b=e.target.closest('.pill'); if(!b) return; filt.sport=b.dataset.sport; document.querySelectorAll('#sportPills .pill').forEach(function(p){p.classList.toggle('active',p===b);}); render(); });
  (async function(){
    try {
      ALL = await STS.loadTeams();
      // records aren't stored on team docs — compute them from finished games
      try {
        var games = await STS.loadGames({});
        var st = STS.computeStandings(games || []);
        st.forEach(function(r){ var k=String(r.team||'').toLowerCase(); REC[k]={ w:r.w, l:r.l, ties:r.ties }; });
      } catch(e){}
      render();
    } catch(e){ document.getElementById('teamGrid').innerHTML = '<div class="empty">Could not load teams.</div>'; }
  })();
</script>

</body>
</html>
